services:
  postgres:
    image: postgres:16-alpine
    container_name: travinh-realty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travinh_realty
      POSTGRES_USER: travinh_user
      POSTGRES_PASSWORD: travinh_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travinh_user -d travinh_realty"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

