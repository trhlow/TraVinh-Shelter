services:
  postgres:
    image: postgres:16-alpine
    container_name: travinh-realty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travinh_realty}
      POSTGRES_USER: ${POSTGRES_USER:-travinh_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travinh_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travinh_app} -d ${POSTGRES_DB:-travinh_realty}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-springboot
    container_name: travinh-realty-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-travinh_realty}
      DB_USERNAME: ${POSTGRES_USER:-travinh_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-travinh_dev_password}
      JWT_SECRET: ${JWT_SECRET:-travinh-dev-secret-key-change-me-32-bytes}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      MEDIA_STORAGE_PATH: ${MEDIA_STORAGE_PATH:-/app/media}
      MEDIA_PUBLIC_URL_PREFIX: ${MEDIA_PUBLIC_URL_PREFIX:-/api/v1/media}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend-react
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_USE_MOCK_API: "false"
    container_name: travinh-realty-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-travinh_realty_postgres_data}
  backend_media:
    name: ${BACKEND_MEDIA_VOLUME_NAME:-travinh_realty_backend_media}

