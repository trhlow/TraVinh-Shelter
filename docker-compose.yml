services:
  postgres:
    image: postgres:16-alpine
    container_name: tv_realty_db
    environment:
      POSTGRES_DB: tv_realty_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tv_realty_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
