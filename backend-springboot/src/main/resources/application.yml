server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: travinh-realty-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travinh_realty}
    username: ${DB_USERNAME:travinh_user}
    password: ${DB_PASSWORD:travinh_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: ${JWT_EXPIRATION:86400000}
  storage:
    local-path: ${MEDIA_STORAGE_PATH:./media}
