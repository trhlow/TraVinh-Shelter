server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  forward-headers-strategy: framework

spring:
  application:
    name: travinh-realty-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  jackson:
    default-property-inclusion: non_null
  data:
    web:
      pageable:
        max-page-size: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  storage:
    local-path: ${MEDIA_STORAGE_PATH:./media}
    public-url-prefix: ${MEDIA_PUBLIC_URL_PREFIX:${server.servlet.context-path:}/media}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
