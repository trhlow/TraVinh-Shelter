server:
  port: 8080

spring:
  application:
    name: travinh-realty-portal
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travinh_realty}
    username: ${DB_USERNAME:travinh_user}
    password: ${DB_PASSWORD:travinh_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

